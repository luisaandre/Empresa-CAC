<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/x-icon" href="imgs/favicon-cac.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Outfit:wght@100..900&family=Raleway:ital,wght@0,100..900;1,100..900&family=Rubik:ital,wght@0,300..900;1,300..900&family=Varela+Round&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../style.css">
    <script type="module" src="../main.js" defer></script>
    <title>CAC - Cadastro de produtos</title>
</head>
<body>
    <header>
        <img src="../imgs/logo.png" class="logo">
        
        <div class="perfil">
            
            <button class="troca-perfil">
                <img src="../imgs/foto-perfil-joao.png" class="foto-perfil">
                <p id="usuario">João da Silva</p>
                <p id="cargo">Administração</p>
                <div class="seta" id="seta-usuario"></div>
            </button>

            <a href="../Financeiro/saidas.html" class="outro-perfil">
                <img src="../imgs/foto-perfil-maria.png" class="foto-perfil">
                <p id="usuario">Maria Souza</p>
                <p id="cargo">Financeiro</p>
            </a>
            
        </div>
    </header>

    <section class="barra-lateral">
        <div class="produtos-contain">
            <div class="produto-row">
                <div class="seta" id="seta-pedidos"></div>
                <h2 class="produtos">Produtos</h2>
            </div>

            <a href="estoque.html" class="estoque-contain">
                <h3 class="estoque">Estoque</h3>
            </a>

            <a href="historico.html" class="historico-contain">
                <h3 class="historico">Histórico de saídas</h3>
            </a>
            
        </div>
        
        <div class="fornecedores">
            <div class="fornec-row">
                <a href="fornecedores.html" class="fornec-contain">
                    <h2 class="fornec">Fornecedores</h2>
                </a>
            </div>
        </div>

    </section>
    
    <section class="conteudo">
        <h1 class="titulo">Cadastrar novo produto</h1>

        <section class="formulario">
            <form action="" method="POST" class="form-cadastro">
        
                <div class="linha-1">
                    <div class="campo" style="flex: 1.5;">
                        <label for="nome-produto">Nome do produto:</label>
                        <input type="text" id="nome-produto" name="nome-produto">
                    </div>

                    <div class="campo" style="flex: 1;">
                        <label for="fornecedor">Fornecedor:</label>
                        <select id="fornecedor" name="fornecedor">
                            <option value="" disabled selected>Selecione um fornecedor</option>
                        </select>
                    </div>
                </div>

                <div class="linha-2">
                    <div class="campo">
                        <label for="quantidade">Quantidade:</label>
                        <input type="number" id="quantidade" name="quantidade">
                    </div>

                    <div class="campo">
                        <label for="valor-unitario">Valor unitário:</label>
                        <div class="input-com-cifrao">
                            <span class="cifrao">R$</span>
                            <input type="text" id="valor-unitario" name="valor-unitario">
                        </div>
                    </div>

                    <div class="campo">
                        <label for="valor-total">Valor total:</label>
                        <div class="input-com-cifrao">
                            <span class="cifrao">R$</span>
                            <input type="text" id="valor-total" name="valor-total">
                        </div>
                    </div>

                    <div class="campo">
                        <label for="tipo">Categoria:</label>
                        <select id="tipo" name="tipo">
                            <option value="" disabled selected>Selecione uma categoria</option>
                        </select>
                    </div>
                </div>

                <div class="linha-3">
                    <div class="campo">
                        <label for="data-compra">Data da compra:</label>
                        <input type="date" id="data-compra" name="data-compra">
                    </div> 
                </div>
            </form>
        </section>

        <div class="container-botao">
            <button class="salvar" id="btn-salvar-produto">Salvar</button>
        </div>
        
    </section>
    
</body>
</html>

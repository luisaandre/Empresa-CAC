<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/x-icon" href="imgs/favicon-cac.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Outfit:wght@100..900&family=Raleway:ital,wght@0,100..900;1,100..900&family=Rubik:ital,wght@0,300..900;1,300..900&family=Varela+Round&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <script type="module" src="main.js" defer></script>
    <title>CAC - Login</title>
</head>
<body class="pagina-login">
    
    <main class="login-container">
        <img src="imgs/logo.png" alt="Logo CAC" class="logo-login">
        
        <div class="form-login">
            <div class="input-linha">
                <input type="email" id="email" placeholder="E-mail corporativo">
                <span class="icone-input icone-user"></span>
            </div>
            
            <div class="input-linha">
                <input type="password" id="senha" placeholder="Senha">
                <span class="icone-input icone-eye"></span>
            </div>
            
            <p id="mensagem-erro" class="oculto">E-mail ou senha incorretos.</p>
            
            <button id="btn-entrar">Entrar</button>
        </div>
    </main>

</body>
</html>

<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/x-icon" href="../imgs/favicon-cac.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Outfit:wght@100..900&family=Raleway:ital,wght@0,100..900;1,100..900&family=Rubik:ital,wght@0,300..900;1,300..900&family=Varela+Round&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../style.css">
    <script type="module" src="../main.js" defer></script>
    <title>CAC - Login</title>
</head>
<body>
    <section class="login-card">
        <img src="imgs/logo.png" alt="Logo CAC">
        <h2>Bem-vindo</h2>
        
        <div class="input-group">
            <label>E-mail:</label>
            <input type="email" id="email" placeholder="joaodasilva@cac.br">
        </div>
        
        <div class="input-group">
            <label>Senha:</label>
            <input type="password" id="senha" placeholder="••••">
        </div>
        
        <button id="btn-entrar">Entrar</button>
        <p id="mensagem-erro" class="oculto">Credenciais incorretas.</p>
    </section>
    
</body>
</html>
